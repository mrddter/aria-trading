name = "binance-trading-bot"
main = "src/index.ts"
compatibility_date = "2026-03-01"

# Cron: every 5 minutes (collect + process + trade), and 23:05 UTC daily for snapshot
[triggers]
crons = ["*/5 * * * *", "5 23 * * *"]

[vars]
ENVIRONMENT = "mainnet"
BOT_ACTIVE = "true"
EXCHANGE = "hyperliquid"
HL_WALLET_ADDRESS = "0xA617CAfCC46DE8852E16F06a93b39c694d18003C"

# KV namespace for persistent cost tracking
[[kv_namespaces]]
binding = "COSTS"
id = "1720eee70b314603a642a9117d5ac32c"

# Workers AI binding for Llama 4 Scout (free tier)
[ai]
binding = "AI"

# D1 Database for experience memory
[[d1_databases]]
binding = "DB"
database_name = "trading-experience"
database_id = "1807db45-e6ba-4f4c-87a8-55706251eda4"
